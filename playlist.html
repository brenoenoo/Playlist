<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="CSS/playlist.css">
    <title>Gerenciador de Playlist</title>
</head>
<body>
    <main>
        <div class="container">
            <div class="form-card">
                <h2>Cadastrar Nova Música</h2>

                <form action="cadastro_produto.php" method="POST">
                    <div class="form-group">
                        <label>Nome da Música:</label>
                        <input type="text" placeholder="Digite o nome da música" name="nome" required>
                    </div>

                    <div class="form-group">
                        <label>Duração:</label>
                        <input type="number" step="0.01" min="0" placeholder="Duração da música" name="duracao" required>
                    </div>

                    <div class="form-group">
                        <label>Gênero da Música:</label>
                        <input type="text" placeholder="Informe o gênero da música" name="genero" required>
                    </div>

                    <div class="form-group">
                        <label>Link da Música:</label>
                        <input type="text" placeholder="Coloque o link da música" name="link" accept="" required>
                    </div>

                    <button class="btn">Cadastrar Produto</button>

                </form>
            </div>
        </div>    
    </main>
    
</body>
</html>
